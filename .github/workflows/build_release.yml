name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ===========================================================================
  # WINDOWS BUILDS
  # ===========================================================================
  build-windows:
    name: Build Windows (Client & Server)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Install Inno Setup
        run: |
          choco install innosetup

      # ------------------------------------------------------------------
      # 1. Build HomeCloudApp (Client) - Windows
      # ------------------------------------------------------------------
      - name: Build HomeCloudApp (Client)
        working-directory: HomeCloudApp
        run: |
          flutter pub get
          flutter build windows --release

      - name: Create Client Installer
        working-directory: HomeCloudApp
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\HomeCloudSetupScript.iss"

      # ------------------------------------------------------------------
      # 2. Build HomeCloudServerApp (Server) - Windows
      # ------------------------------------------------------------------
      - name: Build HomeCloudServerApp (Server)
        working-directory: HomeCloudServerApp
        run: |
          flutter pub get
          flutter build windows --release

      - name: Build Go Backend (Windows)
        working-directory: HomeCloudServerApp/backend
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o server.exe .

      - name: Prepare Server Files
        shell: powershell
        run: |
          $dest = "HomeCloudServerApp\build\windows\x64\runner\Release\server"
          New-Item -ItemType Directory -Force -Path $dest
          
          # Copy Backend Executable
          Copy-Item "HomeCloudServerApp\backend\server.exe" -Destination $dest -Force
          
          # Copy cloudflared if exists (Download if missing, but assuming repo has it)
          if (Test-Path "HomeCloudServerApp\backend\cloudflared.exe") {
            Copy-Item "HomeCloudServerApp\backend\cloudflared.exe" -Destination $dest -Force
          } else {
             Write-Host "Downloading cloudflared..."
             try {
                Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "$dest\cloudflared.exe"
             } catch {
                Write-Host "Failed to download cloudflared, skipping..."
             }
          }

          # Handle .env
          if (Test-Path "HomeCloudServerApp\backend\.env") {
            Copy-Item "HomeCloudServerApp\backend\.env" -Destination $dest -Force
          } elseif (Test-Path "HomeCloudServerApp\backend\.env.example") {
            Copy-Item "HomeCloudServerApp\backend\.env.example" -Destination "$dest\.env" -Force
          }

          # Copy config
          if (Test-Path "HomeCloudServerApp\backend\config.yml") {
            Copy-Item "HomeCloudServerApp\backend\config.yml" -Destination $dest -Force
          }
          
          # Copy uploads folder structure
          $uploadsPath = "$dest\uploads"
          New-Item -ItemType Directory -Force -Path $uploadsPath

      - name: Create Server Installer
        working-directory: HomeCloudServerApp
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\HomeCloudServerSetupScript.iss"

      - name: Upload Windows Installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            HomeCloudApp/installer/Output/*.exe
            HomeCloudServerApp/installer/Output/*.exe

  # ===========================================================================
  # LINUX BUILDS
  # ===========================================================================
  build-linux:
    name: Build Linux (Client & Server)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev wget fuse libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libmpv-dev libayatana-appindicator3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      # ------------------------------------------------------------------
      # 1. Build HomeCloudApp (Client) - Linux
      # ------------------------------------------------------------------
      - name: Build HomeCloudApp (Client)
        working-directory: HomeCloudApp
        run: |
          flutter pub get
          flutter build linux --release
          chmod +x build_appimage.sh
          ./build_appimage.sh

      # ------------------------------------------------------------------
      # 2. Build HomeCloudServerApp (Server) - Linux
      # ------------------------------------------------------------------
      - name: Build HomeCloudServerApp (Server)
        working-directory: HomeCloudServerApp
        run: |
          flutter pub get
          flutter build linux --release

      - name: Build Go Backend (Linux)
        working-directory: HomeCloudServerApp/backend
        run: |
          go mod tidy
          CGO_ENABLED=1 go build -ldflags="-s -w" -o linux/server_linux_amd64 .
          
          # Ensure cloudflared is present
          if [ ! -f "linux/cloudflared" ]; then
             echo "Downloading cloudflared..."
             mkdir -p linux
             wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O linux/cloudflared
             chmod +x linux/cloudflared
          fi

      - name: Create Server AppImage
        working-directory: HomeCloudServerApp
        run: |
          chmod +x build_appimage.sh
          ./build_appimage.sh

      - name: Upload Linux AppImages
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimages
          path: |
            HomeCloudApp/*.AppImage
            HomeCloudServerApp/*.AppImage

  # ===========================================================================
  # ANDROID BUILD (Client Only)
  # ===========================================================================
  build-android:
    name: Build Android (Client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK (Client)
        working-directory: HomeCloudApp
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: HomeCloudApp/build/app/outputs/flutter-apk/app-release.apk

  # ===========================================================================
  # iOS BUILD (Client Only)
  # ===========================================================================
  build-ios:
    name: Build iOS (Client)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build iOS (No Codesign)
        working-directory: HomeCloudApp
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Archive iOS App
        run: |
          cd HomeCloudApp/build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload
          zip -r HomeCloudApp-iOS.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: HomeCloudApp/build/ios/iphoneos/HomeCloudApp-iOS.ipa

  # ===========================================================================
  # MACOS BUILD (Server Only)
  # ===========================================================================
  build-macos:
    name: Build macOS (Server)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Install create-dmg
        run: brew install create-dmg

      # ------------------------------------------------------------------
      # Build Server App
      # ------------------------------------------------------------------
      - name: Build macOS App
        working-directory: HomeCloudServerApp
        run: |
          flutter pub get
          flutter config --enable-macos-desktop
          flutter build macos --release

      # ------------------------------------------------------------------
      # Prepare Backend for macOS
      # ------------------------------------------------------------------
      - name: Build Backend & Prepare Assets
        working-directory: HomeCloudServerApp/backend
        run: |
          # Build Go Binary
          go mod tidy
          CGO_ENABLED=1 go build -ldflags="-s -w" -o server_binary .
          
          # Download cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64.tgz
          tar -xzf cloudflared-darwin-amd64.tgz
          mv cloudflared cloudflared_binary
          
          # Define App Bundle Resources Path
          APP_RESOURCES="../build/macos/Build/Products/Release/HomeCloudServerApp.app/Contents/Resources"
          SERVER_DIR="$APP_RESOURCES/server"
          mkdir -p "$SERVER_DIR"
          
          # Copy Binaries
          cp server_binary "$SERVER_DIR/server"
          cp cloudflared_binary "$SERVER_DIR/cloudflared"
          chmod +x "$SERVER_DIR/server"
          chmod +x "$SERVER_DIR/cloudflared"
          
          # Copy Config & Env
          if [ -f ".env" ]; then
            cp .env "$SERVER_DIR/.env"
          elif [ -f ".env.example" ]; then
            cp .env.example "$SERVER_DIR/.env"
          fi
          
          if [ -f "config.yml" ]; then
            cp config.yml "$SERVER_DIR/config.yml"
          fi
          
          mkdir -p "$SERVER_DIR/uploads"

      # ------------------------------------------------------------------
      # Package as DMG
      # ------------------------------------------------------------------
      - name: Create DMG
        working-directory: HomeCloudServerApp
        run: |
          APP_NAME="HomeCloudServerApp"
          APP_PATH="build/macos/Build/Products/Release/$APP_NAME.app"
          DMG_NAME="HomeCloudServer-macOS.dmg"
          
          create-dmg \
            --volname "HomeCloud Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 200 190 \
            --hide-extension "$APP_NAME.app" \
            --app-drop-link 600 185 \
            "$DMG_NAME" \
            "$APP_PATH"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-server-dmg
          path: HomeCloudServerApp/HomeCloudServer-macOS.dmg
